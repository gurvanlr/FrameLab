<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles/base.css">
  <script src="scripts/app.js"></script>
  <title>Challenges</title>
</head>


<body>

  <script>includes('_header.html')</script>
  
  <div class="center">
    <table>
      <tbody id="challengeBody"></tbody>
    </table>
  </div>
</body>
<script>
  const challengeBody = document.getElementById("challengeBody");

  async function fetchJSON(url, opts) {
    const resp = await fetch(url, opts);
    return resp.json();
  }

  async function init() {
    let me = null;
    try {
        me = await fetchJSON("/api/users/me", { credentials: "include" });
    } catch (e) {}

    const challenges = await fetchJSON("/api/challenges");
    for (const challenge of challenges) {
        const tr = document.createElement("tr");

        const tdTitle = document.createElement("td");
        tdTitle.textContent = challenge.title;
        tr.appendChild(tdTitle);

        const tdDesc = document.createElement("td");
        tdDesc.textContent = challenge.description;
        tr.appendChild(tdDesc);

        const tdImg = document.createElement("td");
        const img = document.createElement("img");
        img.src = challenge.url;
        tdImg.appendChild(img);
        tr.appendChild(tdImg);

        const tdStart = document.createElement("td");
        tdStart.textContent = challenge.date_start;
        tr.appendChild(tdStart);

        const tdEnd = document.createElement("td");
        tdEnd.textContent = challenge.date_end;
        tr.appendChild(tdEnd);

        const tdBtn = document.createElement("td");
        const btn = document.createElement("a");
        btn.className = "btn-participations";
        btn.textContent = "Voir les participations";
        btn.href = `participations.html?challenge_id=${challenge.id}`;
        tdBtn.appendChild(btn);

        if (me && me.is_admin) {
            const btnToggle = document.createElement("button");
            btnToggle.textContent = challenge.is_active ? "Désactiver" : "Activer";
            btnToggle.addEventListener("click", async () => {
              console.log("click sur challenge", challenge.id);
                await fetch("/api/challenges/" + challenge.id + "/active", {
                    method: "PUT",
                    credentials: "include"
                });
                window.location.reload();
            });
            tdBtn.appendChild(btnToggle);
        }

        tr.appendChild(tdBtn);
        challengeBody.appendChild(tr);
    }
}


  init();
</script>

</html>
