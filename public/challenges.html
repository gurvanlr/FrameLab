<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Challenges</title>
</head>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, sans-serif;
    color: #333;
    background-color: rgba(5, 173, 78, 0.774);
    min-height: 100vh;
  }
  header {
    display: flex;
    justify-content: center;
    padding: 20px 0;
    width: 100%;
  }
  .menu {
    display: flex;
    gap: 20px;
    align-items: center;
  }
  .menu a {
    text-decoration: none;
    color: #333;
    font-weight: bold;
  }
  .menu a:hover { text-decoration: underline; }
  div {
    display: flex;
    justify-content: center;
    padding-top: 30px;
  }
  table {
    background: white;
    border-radius: 8px;
    overflow: hidden;
    border-collapse: collapse;
  }
  td {
    padding: 12px 16px;
    border-bottom: 1px solid #e0e0e0;
    vertical-align: middle;
    font-size: 14px;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f5f5f5; }
  td img {
    width: 200px;
    height: auto;
    display: block;
    border-radius: 4px;
  }
  .btn-participations {
    padding: 7px 14px;
    background: #2d6a4f;
    color: white;
    border: none;
    border-radius: 4px;
    font-size: 13px;
    font-weight: bold;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
  }
  .btn-participations:hover { background: #235c42; }
  .hide { display: none; }
</style>
<header>
  <nav class="menu" id="menu">
    <a href="index.html">Accueil</a> |
    <a href="connexion_user.html" id="connexion">Connexion</a> |
    <a href="challenges.html">Challenges</a> |
  </nav>
</header>
<body>
  <div>
    <table>
      <tbody id="challengeBody"></tbody>
    </table>
  </div>
</body>
<script>
  const menu = document.getElementById("menu");
  const challengeBody = document.getElementById("challengeBody");

  async function fetchJSON(url, opts) {
    const resp = await fetch(url, opts);
    return resp.json();
  }

  async function init() {
    const user = await fetchJSON("/api/users/me", { credentials: "include" });
    if (user?.id) {
      menu.appendChild(Object.assign(document.createElement("span"), {
        textContent: `Bonjour, ${user.firstname} ${user.name}`
      }));
      document.getElementById("connexion").classList.add("hide");
    }

    const challenges = await fetchJSON("/api/challenges");
    for (const challenge of challenges) {
      const tr = document.createElement("tr");

      const tdTitle = document.createElement("td");
      tdTitle.textContent = challenge.title;
      tr.appendChild(tdTitle);

      const tdDesc = document.createElement("td");
      tdDesc.textContent = challenge.description;
      tr.appendChild(tdDesc);

      const tdImg = document.createElement("td");
      const img = document.createElement("img");
      img.src = challenge.url;
      tdImg.appendChild(img);
      tr.appendChild(tdImg);

      const tdStart = document.createElement("td");
      tdStart.textContent = challenge.date_start;
      tr.appendChild(tdStart);

      const tdEnd = document.createElement("td");
      tdEnd.textContent = challenge.date_end;
      tr.appendChild(tdEnd);

      const tdBtn = document.createElement("td");
      const btn = document.createElement("a");
      btn.className = "btn-participations";
      btn.textContent = "Voir les participations";
      btn.href = `participations.html?challenge_id=${challenge.id}`;
      tdBtn.appendChild(btn);
      tr.appendChild(tdBtn);

      challengeBody.appendChild(tr);
    }
  }

  init();
</script>
</html>
