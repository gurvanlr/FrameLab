<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: #333;
  background-color: rgba(5, 173, 78, 0.774);
}

header {
  display: flex;
  justify-content: center;
  padding: 20px 0;
}

.menu {
  display: flex;
  gap: 20px;
}

.menu a {
  text-decoration: none;
  color: #333;
  font-weight: bold;
}

div {
  display: flex;
  justify-content: center;
  padding-top: 30px;
}

.button {
    display: flex;
  justify-content: center;
  padding: 20px 0;
  text-decoration: none;
  color: #333;
  font-weight: bold;
}

.hide {
  display: none;
}
</style>

<header>
  <nav class="menu" id="menu">
    <a href="index.html">Accueil</a>
    <a href="connexion_user.html" id="connexion">Connexion</a>
    <a href="challenges.html">challenges</a>
    <a href="creation_challenge.html">création des challenges</a>
  </nav>
</header>

<body>
  <form id="loginform">
    <input type="text" class="form-control" placeholder="écrit un mail" name="mail" required>
    <input type="password" class="form-control" placeholder="écrit un mot de passe" name="password" required>
    <button type="submit"> Connexion</button>
</form>
<a href="creation_user.html" class="button">Création de compte</a>
</body>

<script>
  const menu = document.getElementById("menu");
  const form = document.getElementById("loginform");

  form.addEventListener("submit", async (e) => {e.preventDefault()

    const formData = {
    mail: form.mail.value,
    password: form.password.value
  };

  const response = await fetch ("/api/auth/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(formData),
    credentials: "include"
  })

  const data = await response.json();

  if (data.succes) {
    window.location.href = "/index.html"
  }else{
    alert("Email ou mot de passe incorrect");
  }
  });

  async function userActive() {
    const resp = await fetch ("/api/users/me", {credentials : "include"});
    const data = await resp.json();
    return data;
  }

  async function init() {

    const user = await userActive();
    console.log(user);
    if (user && user.id) {
      const span = document.createElement("span");
      span.textContent = "Bonjour, " + user.firstname + " " + user.name;
      menu.appendChild(span);
      connexion.classList.add("hide");
    }

  }

  init();
</script>
