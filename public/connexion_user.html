<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles/base.css">
  <script src="scripts/app.js"></script>
  <title>Document</title>
</head>


<body>
  <script>includes('_header.html')</script>

  <form id="loginform">
    <input type="text" class="form-control" placeholder="écrit un mail" name="mail" required>
    <input type="password" class="form-control" placeholder="écrit un mot de passe" name="password" required>
    <button type="submit"> Connexion</button>
  </form>
  <a href="creation_user.html" class="button">Création de compte</a>
</body>

<script>
  const form = document.getElementById("loginform");

  form.addEventListener("submit", async (e) => {
    e.preventDefault()

    const formData = {
      mail: form.mail.value,
      password: form.password.value
    };

    const response = await fetch("/api/auth/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(formData),
      credentials: "include"
    })

    const data = await response.json();
    console.log (data);

    if (data.success) {
      window.location.href = "/index.html";
    } else if (data.message === "Compte non validé") {
      alert("Merci de valider ton compte via le lien reçu.");
    } else {
      alert("Email ou mot de passe incorrect");
    }
  });
</script>
