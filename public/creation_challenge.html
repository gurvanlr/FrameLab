<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, sans-serif;
    color: #333;
    background-color: rgba(5, 173, 78, 0.774);
    min-height: 100vh;
  }

  
  header {
    display: flex;
    justify-content: center;
    padding: 20px 0;
  }

  .menu {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .menu a {
    text-decoration: none;
    color: #333;
    font-weight: bold;
  }

  .menu a:hover { text-decoration: underline; }

  
  form {
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: white;
    padding: 32px;
    border-radius: 8px;
    width: 400px;
    margin: 30px auto 0;
  }

  input[type="text"],
  input[type="date"] {
    padding: 10px 12px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 14px;
    font-family: Arial, sans-serif;
  }

  input[type="text"]:focus,
  input[type="date"]:focus {
    outline: none;
    border-color: #2d6a4f;
  }

  input[type="file"] {
    font-size: 13px;
    color: #666;
  }

  button[type="submit"] {
    padding: 10px;
    background: #2d6a4f;
    color: white;
    border: none;
    border-radius: 4px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
  }

  button[type="submit"]:hover { background: #235c42; }

  
  .hide { display: none; }
</style>

<header>
  <nav class="menu" id="menu">
    <a href="index.html">Accueil</a> |
    <a href="connexion_user.html" id="connexion">Connexion</a> |
    <a href="challenges.html">Challenges</a> |
  </nav>
</header>

<body>
  <form id="form" method="post" enctype="multipart/form-data">
    <input type="text" name="title" placeholder="Titre du challenge">
    <input type="text" name="description" placeholder="Description">
    <input type="date" name="date_start">
    <input type="date" name="date_end">
    <input type="file" name="uploaded_file">
    <button type="submit">Créer Challenge</button>
  </form>
</body>

<script>
  const menu = document.getElementById("menu");
  const form = document.getElementById("form");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const formData = new FormData(form);

    const response = await fetch("/api/challenges", {
      method: "POST",
      body: formData,
      credentials: "include"
    })

    const data = await response.json();

    if (data.succes) {
      window.location.href = "/challenges.html"
    } else {
      alert("Erreur à la création du challenge");
    };
  });

  async function userActive() {
    const resp = await fetch("/api/users/me", { credentials: "include" });
    const data = await resp.json();
    return data;
  }

  async function init() {

    const user = await userActive();
    console.log(user);
    if (user && user.id) {
      const span = document.createElement("span");
      span.textContent = "Bonjour, " + user.firstname + " " + user.name;
      menu.appendChild(span);
      connexion.classList.add("hide");
    }

  }

  init();
</script>
