<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles/base.css">
  <script src="scripts/app.js"></script>
  <title>Document</title>
</head>


<body>
  <script>includes('_header.html')</script>

  <form id="registerform">
    <div class="form-group">
      <input type="mail" class="form-control" placeholder="écrit un mail" name="mail">
      <input type="password" class="form-control" placeholder="écrit un mot de passe" name="password">
      <input type="text" class="form-control" placeholder="écrit un nom" name="name">
      <input type="text" class="form-control" placeholder="écrit un prénom" name="firstname">
      <button type="submit" placehold er="Créer">Créer</button>
    </div>
  </form>
  <div id="validationLink"></div>

</body>

</html>

<script>
  const form = document.getElementById("registerform");
  const validation = document.getElementById("validationLink")

  form.addEventListener("submit", async (e) => {
    e.preventDefault()

    const formData = {
      mail: form.mail.value,
      password: form.password.value,
      name: form.name.value,
      firstname: form.firstname.value
    };

    const response = await fetch("/api/users", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(formData),
      credentials: "include"
    })

    const data = await response.json();
    console.log(data);

    if (data.success) {
      validation.textContent = "merci d'appuyer sur ce lien pour valider le compte : ";
      const link = document.createElement("a");
      link.textContent = "validation";
      link.href = `/validation.html?id=${data.id}`;
      validation.appendChild(link);
    } else {
      alert("Email déjà utilisé");
    }
  });
</script>
