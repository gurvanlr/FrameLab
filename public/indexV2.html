<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<header id="header">
    <nav class="menu" id="menu">
        <a href="index.html">Accueil</a>
        <a id="connexion" href="connexion_user.html">Connexion</a>
        <a href="challenges.html">challenges</a>
        <a href="creation_challenge.html">création des challenges</a>
        <a href="indexV2.html">test index</a>
        <button id="logout" class="hide">Déconnexion</button>
    </nav>
</header>


<body>

    <div id="participationContainer"></div>

    <template id="participation_template">

        <div class="participation">

            <div class="header">
                <span class="date"></span>
                <span class="author"></span>
            </div>

            <div class="image-container">
                <img class="image" />
            </div>

            <div class="actions">
                <button class="btn_comment">Afficher les commentaires</button>
                <button class="btn_vote">Voter</button>
            </div>

            <div class="comments_row hide">
                <div class="comment"></div>
            </div>

        </div>

    </template>

    <template id="vote_form">
        <div class="vote_form hide">
            <input type="number" class="creative" placeholder="Note créativité">
            <input type="number" class="technical" placeholder="Note technique">
            <input type="number" class="theme" placeholder="Respect du thème">
            <button class="send_vote">Envoyer les votes</button>
        </div>
    </template>


</body>

<script>

    const menu = document.getElementById("menu");
    const logout = document.getElementById("logout");
    const connexion = document.getElementById("connexion");
    const container = document.getElementById("participationContainer");
    const vote_container = document.getElementById("vote_form")

    async function active_challenge() {
        const resp = await fetch("/api/challenges/active");
        const challenges = await resp.json();
        return challenges;
    }

    async function participationByChallengeId(id) {
        const resp = await fetch("/api/challenges/" + id + "/participations");
        const data = await resp.json();
        return data;
    }

    async function userActive() {
        const resp = await fetch("/api/users/me", { credentials: "include" });
        const data = await resp.json();
        return data;
    }

    function useTemplate(id) {
        const template = document.querySelector(`#${id}`);
        return document.importNode(template.content, true);
    }

    function useVoteTemplate() {
        return useTemplate("vote_form");
    }

    function createParticipation(participation, user) {
        const template = useTemplate("participation_template");
        const vote_template = useVoteTemplate();

        const date = template.querySelector(".date");
        const author = template.querySelector(".author");
        const image = template.querySelector(".image");
        const btnComment = template.querySelector(".btn_comment");
        const btnVote = template.querySelector(".btn_vote");
        const commentsRow = template.querySelector(".comments_row");
        const commentContainer = template.querySelector(".comment");
        const vote_form = vote_template.querySelector(".vote_form");
        const vote_send = vote_template.querySelector(".send_vote");

        date.textContent = participation.created;
        author.textContent = participation.name + " " + participation.firstname;
        image.src = "/upload/" + participation.url;

        template.querySelector(".participation").appendChild(vote_form)

        btnComment.addEventListener("click", async () => {
            if (!commentsRow.classList.contains("hide")) {
                commentsRow.classList.toggle("hide");
                btnComment.textContent = "Afficher les commentaires";
                return;
            }

            try {
                const resp = await fetch("/api/comments/participations/" + participation.participation_id);
                const comments = await resp.json();
                commentContainer.innerHTML = "";

                if (comments.length === 0) {
                    tdComments.textContent = "Aucun commentaire";
                } else {
                    for (let comment of comments) {
                        const p = document.createElement("p");
                        p.textContent = comment.content;
                        commentContainer.appendChild(p);
                    }
                }
                commentsRow.classList.remove("hide");
            } catch (e) {
                commentContainer.textContent("Erreur de chargement" + e);
            }
        })

        btnVote.addEventListener("click", async () => {
            vote_form.classList.toggle("hide");
        })

        vote_send.addEventListener("click", async () => {

            const creative = vote_form.querySelector(".creative").value;
            const technical = vote_form.querySelector(".technical").value;
            const theme = vote_form.querySelector(".theme").value;

            const request = {
                creative_note: creative,
                technical_note: technical,
                theme_note: theme,
                user_id: user.id,
                participation_id: participation.participation_id
            }

            const response = await fetch("/api/votes", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(request),
                credentials: "include"
            })

            const data = await response.json();

            if (data.succes) {
                window.location.href = "/indexV2.html"
            } else {
                alert("La notation n'a pas été prix en compte");
            }
        })

        return template;
    }

    async function init() {

        try {
            const user = await userActive();

            if (user && user.id) {
                const span = document.createElement("span");
                span.textContent = "Bonjour, " + user.firstname + " " + user.name;
                menu.appendChild(span);

                connexion.classList.add("hide");
                logout.classList.remove("hide");
            }

            const challenges = await active_challenge();

            for (let challenge of challenges) {
                const participations = await participationByChallengeId(challenge.id);

                for (let participation of participations) {
                    const element = createParticipation(participation, user);
                    container.appendChild(element);
                }
            }

        } catch (e) {
            console.error("Erreur d'initialisation " + e);
        }

    }

    logout.addEventListener("click", async () => {
        await fetch("/api/auth/logout", {
            method: "POST",
            credentials: "include"
        });

        window.location.reload();
    });

    init();
</script>

</html>
