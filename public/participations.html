<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Participations</title>
</head>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, sans-serif;
    color: #333;
    background-color: rgba(5, 173, 78, 0.774);
    min-height: 100vh;
  }
  header {
    display: flex;
    justify-content: center;
    padding: 20px 0;
    width: 100%;
  }
  .menu {
    display: flex;
    gap: 20px;
    align-items: center;
  }
  .menu a {
    text-decoration: none;
    color: #333;
    font-weight: bold;
  }
  .menu a:hover { text-decoration: underline; }
  div {
    display: flex;
    justify-content: center;
    padding-top: 30px;
  }
  h2 {
    text-align: center;
    margin-top: 24px;
    font-size: 20px;
    color: white;
  }
  table {
    background: white;
    border-radius: 8px;
    overflow: hidden;
    border-collapse: collapse;
  }
  td {
    padding: 12px 16px;
    border-bottom: 1px solid #e0e0e0;
    vertical-align: middle;
    font-size: 14px;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f5f5f5; }
  td img {
    width: 200px;
    height: auto;
    display: block;
    border-radius: 4px;
  }

  
  .stars {
    display: inline-flex;
    gap: 4px;
    vertical-align: middle;
  }
  .star {
    font-size: 22px;
    color: #ccc;
    cursor: pointer;
    user-select: none;
    transition: color .1s, transform .1s;
    line-height: 1;
  }
  .star.active { color: #e8a020; }
  .star:hover { transform: scale(1.2); }
  .vote-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    font-size: 14px;
  }
  .vote-label {
    width: 90px;
    flex-shrink: 0;
    color: #555;
  }

  
  button {
    padding: 6px 12px;
    border: 1px solid #ccc;
    border-radius: 4px;
    background: white;
    font-size: 13px;
    font-weight: bold;
    cursor: pointer;
    margin-right: 6px;
  }
  button:hover { background: #f0f0f0; }
  .btn-send-vote {
    background: #2d6a4f;
    color: white;
    border-color: #2d6a4f;
    margin-top: 8px;
  }
  .btn-send-vote:hover { background: #235c42; }

  .hide { display: none; }
</style>
<header>
  <nav class="menu" id="menu">
    <a href="index.html">Accueil</a> |
    <a href="connexion_user.html" id="connexion">Connexion</a> |
    <a href="challenges.html">Challenges</a> |
  </nav>
</header>
<body>
  <h2 id="challenge-title">Participations</h2>
  <div>
    <table>
      <tbody id="participationBody"></tbody>
    </table>
  </div>
</body>
<script>
  const menu = document.getElementById("menu");
  const participationBody = document.getElementById("participationBody");
  const challengeTitle = document.getElementById("challenge-title");

  
  const params = new URLSearchParams(window.location.search);
  const challengeId = params.get("challenge_id");

  async function fetchJSON(url, opts) {
    const resp = await fetch(url, opts);
    return resp.json();
  }

  function createStars(container, name) {
    const row = document.createElement("div");
    row.className = "vote-row";

    const label = document.createElement("span");
    label.className = "vote-label";
    label.textContent = name + " :";
    row.appendChild(label);

    const wrap = document.createElement("div");
    wrap.className = "stars";
    let selected = 0;

    for (let i = 1; i <= 5; i++) {
      const s = document.createElement("span");
      s.className = "star";
      s.textContent = "★";
      s.dataset.value = i;

      s.addEventListener("mouseenter", () =>
        [...wrap.children].forEach(st => st.classList.toggle("active", st.dataset.value <= i))
      );
      s.addEventListener("mouseleave", () =>
        [...wrap.children].forEach(st => st.classList.toggle("active", st.dataset.value <= selected))
      );
      s.addEventListener("click", () => {
        selected = i;
        [...wrap.children].forEach(st => st.classList.toggle("active", st.dataset.value <= selected));
      });

      wrap.appendChild(s);
    }

    wrap._getValue = () => selected;
    row.appendChild(wrap);
    container.appendChild(row);
    return wrap;
  }

  function renderParticipation(p, user) {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${p.created}</td>
      <td>${p.name} ${p.firstname}</td>
      <td><img src="/upload/${p.url}"></td>
      <td>
        <button class="btn-comments">Afficher commentaires</button>
        <button class="btn-vote">Voter</button>
      </td>
    `;
    participationBody.appendChild(tr);

    
    const trComments = document.createElement("tr");
    trComments.hidden = true;
    const tdComments = document.createElement("td");
    tdComments.colSpan = 4;
    trComments.appendChild(tdComments);
    participationBody.appendChild(trComments);

    
    const trVotes = document.createElement("tr");
    trVotes.hidden = true;
    const tdVotes = document.createElement("td");
    tdVotes.colSpan = 4;
    trVotes.appendChild(tdVotes);
    participationBody.appendChild(trVotes);

    tr.querySelector(".btn-comments").addEventListener("click", async (e) => {
      const btn = e.target;
      if (!trComments.hidden) {
        trComments.hidden = true;
        btn.textContent = "Afficher commentaires";
        return;
      }
      tdComments.textContent = "Chargement...";
      trComments.hidden = false;
      btn.textContent = "Masquer commentaires";

      const comments = await fetchJSON(`/api/comments/participations/${p.participation_id}`);
      tdComments.innerHTML = "";
      if (!comments.length) {
        tdComments.textContent = "Aucun commentaire.";
      } else {
        comments.forEach(c => {
          tdComments.appendChild(Object.assign(document.createElement("p"), { textContent: c.content }));
        });
      }
    });

    tr.querySelector(".btn-vote").addEventListener("click", () => {
      if (!trVotes.hidden) {
        trVotes.hidden = true;
        return;
      }

      tdVotes.innerHTML = "";
      const starsCreative  = createStars(tdVotes, "Créativité");
      const starsTechnical = createStars(tdVotes, "Technique");
      const starsTheme     = createStars(tdVotes, "Thème");

      const btnSend = document.createElement("button");
      btnSend.className = "btn-send-vote";
      btnSend.textContent = "Envoyer";
      tdVotes.appendChild(btnSend);

      btnSend.addEventListener("click", async () => {
        const body = {
          creative_note:  starsCreative._getValue(),
          technical_note: starsTechnical._getValue(),
          theme_note:     starsTheme._getValue(),
          user_id: user.id,
          participation_id: p.participation_id
        };
        const data = await fetchJSON("/api/votes", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
          credentials: "include"
        });
        if (data.succes) {
          alert("Vote enregistré !");
          btnSend.textContent = "Voté ✓";
          btnSend.disabled = true;
        } else {
          alert("La notation n'a pas été prise en compte.");
        }
      });

      trVotes.hidden = false;
    });
  }

  async function init() {
    const user = await fetchJSON("/api/users/me", { credentials: "include" });
    if (user?.id) {
      menu.appendChild(Object.assign(document.createElement("span"), {
        textContent: `Bonjour, ${user.firstname} ${user.name}`
      }));
      document.getElementById("connexion").classList.add("hide");
    }

    if (!challengeId) {
      challengeTitle.textContent = "Challenge introuvable";
      return;
    }

    
    const challenges = await fetchJSON("/api/challenges");
    const challenge = challenges.find(c => c.id == challengeId);
    if (challenge) {
      challengeTitle.textContent = `Participations — ${challenge.title}`;
    }

    
    const participations = await fetchJSON(`/api/challenges/${challengeId}/participations`);
    if (!participations.length) {
      participationBody.innerHTML = `<tr><td>Aucune participation pour ce challenge.</td></tr>`;
      return;
    }
    participations.forEach(p => renderParticipation(p, user));
  }

  init();
</script>
</html>
