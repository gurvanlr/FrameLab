<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles/base.css">
  <script src="scripts/app.js"></script>
  <title>Participations</title>
</head>


<body>
  <script>includes('_header.html')</script>

  <h2 id="challenge-title">Participations</h2>
  <div class="center">
    <table>
      <tbody id="participationBody"></tbody>
    </table>
  </div>
</body>
<script>
  const participationBody = document.getElementById("participationBody");
  const challengeTitle = document.getElementById("challenge-title");

  const params = new URLSearchParams(window.location.search);
  const challengeId = params.get("challenge_id");

  async function fetchJSON(url, opts) {
    const resp = await fetch(url, opts);
    return resp.json();
  }

  function createStars(container, name) {
    const row = document.createElement("div");
    row.className = "vote-row";

    const label = document.createElement("span");
    label.className = "vote-label";
    label.textContent = name + " :";
    row.appendChild(label);

    const wrap = document.createElement("div");
    wrap.className = "stars";
    let selected = 0;

    for (let i = 1; i <= 5; i++) {
      const s = document.createElement("span");
      s.className = "star";
      s.textContent = "★";
      s.dataset.value = i;

      s.addEventListener("mouseenter", () =>
        [...wrap.children].forEach(st => st.classList.toggle("active", st.dataset.value <= i))
      );
      s.addEventListener("mouseleave", () =>
        [...wrap.children].forEach(st => st.classList.toggle("active", st.dataset.value <= selected))
      );
      s.addEventListener("click", () => {
        selected = i;
        [...wrap.children].forEach(st => st.classList.toggle("active", st.dataset.value <= selected));
      });

      wrap.appendChild(s);
    }

    wrap._getValue = () => selected;
    row.appendChild(wrap);
    container.appendChild(row);
    return wrap;
  }

  function renderParticipation(p, user) {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${p.created}</td>
      <td>${p.name} ${p.firstname}</td>
      <td><img src="/upload/${p.url}"></td>
      <td>
        <button class="btn-comments">Afficher commentaires</button>
        <button class="btn-vote">Voter</button>
      </td>
    `;
    participationBody.appendChild(tr);


    const trComments = document.createElement("tr");
    trComments.hidden = true;
    const tdComments = document.createElement("td");
    tdComments.colSpan = 4;
    trComments.appendChild(tdComments);
    participationBody.appendChild(trComments);


    const trVotes = document.createElement("tr");
    trVotes.hidden = true;
    const tdVotes = document.createElement("td");
    tdVotes.colSpan = 4;
    trVotes.appendChild(tdVotes);
    participationBody.appendChild(trVotes);

    tr.querySelector(".btn-comments").addEventListener("click", async (e) => {
      const btn = e.target;
      if (!trComments.hidden) {
        trComments.hidden = true;
        btn.textContent = "Afficher commentaires";
        return;
      }
      tdComments.textContent = "Chargement...";
      trComments.hidden = false;
      btn.textContent = "Masquer commentaires";

      const comments = await fetchJSON(`/api/comments/participations/${p.participation_id}`);
      tdComments.innerHTML = "";
      if (!comments.length) {
        tdComments.textContent = "Aucun commentaire.";
      } else {
        comments.forEach(c => {
          tdComments.appendChild(Object.assign(document.createElement("p"), { textContent: c.content }));
        });
      }
    });

    tr.querySelector(".btn-vote").addEventListener("click", () => {
      if (!trVotes.hidden) {
        trVotes.hidden = true;
        return;
      }

      tdVotes.innerHTML = "";
      const starsCreative = createStars(tdVotes, "Créativité");
      const starsTechnical = createStars(tdVotes, "Technique");
      const starsTheme = createStars(tdVotes, "Thème");

      const btnSend = document.createElement("button");
      btnSend.className = "btn-send-vote";
      btnSend.textContent = "Envoyer";
      tdVotes.appendChild(btnSend);

      btnSend.addEventListener("click", async () => {
        const body = {
          creative_note: starsCreative._getValue(),
          technical_note: starsTechnical._getValue(),
          theme_note: starsTheme._getValue(),
          user_id: user.id,
          participation_id: p.participation_id
        };
        const data = await fetchJSON("/api/votes", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
          credentials: "include"
        });
        if (data.succes) {
          alert("Vote enregistré !");
          btnSend.textContent = "Voté ✓";
          btnSend.disabled = true;
        } else {
          alert("La notation n'a pas été prise en compte.");
        }
      });

      trVotes.hidden = false;
    });
  }

  async function init() {
    const user = await getUser();

    if (!challengeId) {
      challengeTitle.textContent = "Challenge introuvable";
      return;
    }


    const challenges = await fetchJSON("/api/challenges");
    const challenge = challenges.find(c => c.id == challengeId);
    if (challenge) {
      challengeTitle.textContent = `Participations — ${challenge.title}`;
    }


    const participations = await fetchJSON(`/api/challenges/${challengeId}/participations`);
    if (!participations.length) {
      participationBody.innerHTML = `<tr><td>Aucune participation pour ce challenge.</td></tr>`;
      return;
    }
    participations.forEach(p => renderParticipation(p, user));
  }

  init();
</script>

</html>
