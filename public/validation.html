<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
<div>
    <span id="state"></pan>
</div>
</body>

<script>
    const span = document.getElementById("state")
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('validation_token');

    async function is_active(token) {
       const data =  await fetch ("/api/" + token.id + "/" + token)
        if(data.sucess) {
            span.textContent = "ton compte a bien été créer, tu peux maintenant appuyer sur le boutons pour te connecté   ";
            const button = document.createElement ("button");
            button.textContent = "page de connexion"
            button.addEventListener ("click", () => window.location.href = "connexion_user.html");
            span.appendChild(button);
        } else {
            span.textContent = "ton compte n'as pas bien été créer, tu peux appuyer sur le button pour revenir a l'accueil   ";
            const button = document.createElement ("button");
            button.textContent = "accueil"
            button.addEventListener ("click", () => window.location.href = "index.html");
            span.appendChild(button);
        }

    }

    is_active();


</script>

</html>
